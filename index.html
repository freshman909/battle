
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素军团：对决</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --hand-drawn-border: 4px solid #fff;
        }
        body {
            font-family: 'ZCOOL KuaiLe', 'Press Start 2P', cursive;
            background-color: #1a1a1a;
            color: #ffffff;
            overflow: hidden;
            margin: 0;
            user-select: none;
        }
        .pixel-border {
            border: 4px solid #fff;
            box-shadow: 4px 0 #000, -4px 0 #000, 0 4px #000, 0 -4px #000;
        }
        /* Hand-drawn effect: slightly irregular edges */
        .hand-drawn-border {
            border: 3px solid #fff;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,0.5);
        }
        .pixel-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        }
        .pixel-text-shadow {
            text-shadow: 2px 2px 0px #000;
        }
        .square-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1/1;
            transition: all 0.2s;
        }
        .square-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
        }
        /* Hide scrollbars */
        ::-webkit-scrollbar { display: none; }
    </style>
